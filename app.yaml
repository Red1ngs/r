reader:
  url_add_history: "/addHistory?r=702"
  update_interval_days: 1

  parsing:
    url_catalog:       "/manga"
    url_chapters:      "/manga/{translit_name}"
    url_chapters_load: "/chapters/load"
    url_candy_claim:   "/halloween/takeCandy?r=822"
    reward_selector:   ".reward-item"
    reward_type_attr:  "data-reward-type"
    reward_id_attr:    "data-reward-id"

  reward_slots:
    - name:             "card"
      daily_limit:      10
      interval_seconds: 5400
      reward_keys:      ["id", "name", "image"]
      max_chapters_per_slot: 20

    - name:             "scroll"
      daily_limit:      5
      interval_seconds: 1800
      reward_keys:      ["scroll_id"]
      max_chapters_per_slot: 10

    - name:             "candy"
      daily_limit:      35
      interval_seconds: 180
      reward_keys:      ["token", "type"]
      max_chapters_per_slot: 70

  reading_modes:
    standard:
      slots:               ["card", "scroll"]
      fallback_interval_s: 5400

    event:
      slots:               ["candy", "card", "scroll"]
      fallback_interval_s: 5400

  default_mode: "event"

daily:
  url_balance:        "/balance"
  url_ping:           "/visit/ping"
  url_calendar_claim: "/balance/claim/{}"
  item_selector:      ".daily-rewards .daily-rewards-item"
  claim_text:         "Забрать"
  day_attr:           "data-day"

quiz:
  mode:         "daily"
  answer_limit: 10
  answer_delay: 1.0