reader:
  url_add_history: "/addHistory"
  update_interval_days: 1

  parsing:
    url_catalog:        "/manga"
    url_chapters:       "/manga/{translit_name}"
    url_chapters_load:  "/chapters/load"
    reward_selector:    ".reward-item"
    reward_type_attr:   "data-reward-type"
    reward_id_attr:     "data-reward-id"

  reward_slots:
    - name:             "card"
      daily_limit:      10
      interval_seconds: 5400      # затримка після отримання картки
      reward_keys:      ["id", "name", "image"]

    - name:             "scroll"
      daily_limit:      3
      interval_seconds: 1800      # затримка після отримання свитку
      reward_keys:      ["scroll", "rank", "is_blessed"]

  reading_mode:
    mode:              "standard"
    read_interval_s:   5400       # fallback: слот готовий одразу або всі закриті
    event_interval_s:  120
    card_slot:         "card"
    scroll_slot:       "scroll"

daily:
  url_balance:        "/balance"
  url_ping:           "/visit/ping"
  url_calendar_claim: "/balance/claim/{}"
  item_selector:      ".daily-rewards .daily-rewards-item"
  claim_text:         "Забрать"
  day_attr:           "data-day"

quiz:
  mode:         "daily"
  answer_limit: 10
  answer_delay: 8.0